<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Jasson Farrier</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  overflow-x: hidden;
  font-family: 'Montserrat', sans-serif;
  background: #fff;
  color: #0D1E42;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ---- NAV ---- */

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #fff;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 64px;
  border-bottom: 1px solid #f5f5f5;
}

.nav-brand {
  font-size: 13px;
  font-weight: 700;
  color: #0D1E42;
  text-decoration: none;
  white-space: nowrap;
}

.nav-brand span {
  font-weight: 700;
  color: #0D1E42;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-right a {
  font-size: 12px;
  font-weight: 500;
  color: #9DA6AB;
  text-decoration: none;
  transition: color 0.2s;
}

.nav-right a:hover { color: #0D1E42; }

/* ---- MAIN CONTENT ---- */

.test-main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.test-main h1 {
  font-size: clamp(64px, 10vw, 120px);
  font-weight: 700;
  color: #0D1E42;
  letter-spacing: -2px;
}

/* ---- FOOTER ---- */

footer {
  padding: 48px 64px 32px;
  background: #fff;
  border-top: 1px solid #f5f5f5;
}

.footer-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.footer-brand {
  font-size: 12px;
  font-weight: 700;
  color: #0D1E42;
}

.footer-links {
  display: flex;
  gap: 28px;
}

.footer-links a {
  font-size: 12px;
  font-weight: 500;
  color: #9DA6AB;
  text-decoration: none;
  transition: color 0.2s;
}

.footer-links a:hover { color: #0D1E42; }

.footer-divider {
  border: none;
  border-top: 1px solid #f5f5f5;
  margin-bottom: 24px;
}

.footer-legal {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.footer-legal p {
  font-size: 11px;
  color: #9DA6AB;
  line-height: 1.7;
}

@media (max-width: 768px) {
  nav {
    padding: 0 24px;
  }
  .nav-right {
    gap: 16px;
  }
  footer {
    padding: 40px 24px 28px;
  }
  .footer-top {
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }
  .footer-links {
    flex-wrap: wrap;
    gap: 16px;
  }
}

</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-brand">Jasson Farrier <span>— Kiger Realty</span></a>
  <div class="nav-right">
    <a href="/housing-market-updates">Market Updates</a>
    <a href="/ohio-housing-data">Data</a>
    <a href="/bio">About</a>
    <a href="/contact">Contact</a>
    <a href="https://www.youtube.com/@OhioHousingNerd" aria-label="YouTube">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.54C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#9DA6AB"/>
        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#fff"/>
      </svg>
    </a>
  </div>
</nav>

<!-- MAIN -->
<main class="test-main">
  <h1>TEST</h1>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-top">
    <span class="footer-brand">Jasson Farrier &#183; Kiger Realty</span>
    <div class="footer-links">
      <a href="/housing-market-updates">Market Updates</a>
      <a href="/ohio-housing-data">Data</a>
      <a href="/bio">About</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
  <hr class="footer-divider">
  <div class="footer-legal">
    <img src="fair-housing.webp" alt="Equal Housing Opportunity" style="flex-shrink:0;width:32px;height:auto;opacity:0.6;filter:invert(1);margin-top:2px;">
    <p>
      Jasson Farrier &#183; Kiger Realty &#183; Realtor &#183; License #2018004483 &#183; 614-699-3007<br>
      Equal Housing Opportunity &#183; Information deemed reliable but not guaranteed.
    </p>
  </div>
</footer>

</body>
</html>
