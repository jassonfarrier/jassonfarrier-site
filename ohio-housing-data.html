.main{display:flex;flex:1;overflow:hidden}

.metric-btn{background:rgba(0,210,255,0.03);border:1px solid rgba(0,210,255,0.08);border-radius:6px;padding:11px 13px;cursor:pointer;transition:all .2s;text-align:left;width:100%}

.src{font-size:9px;color:rgba(255,255,255,0.18);line-height:1.7;padding:0 4px;margin-top:auto;padding-top:14px}

#tooltip{position:absolute;pointer-events:none;background:rgba(6,13,31,0.96);border:1px solid rgba(0,210,255,0.35);border-radius:8px;padding:10px 14px;font-size:11px;box-shadow:0 0 20px rgba(0,210,255,0.18);opacity:0;transition:opacity .15s;z-index:50;min-width:160px}
#tooltip .tc{font-size:13px;font-weight:700;color:#00d4ff;margin-bottom:3px}
#tooltip .tv{font-size:19px;font-weight:900;color:#fff;line-height:1}
#tooltip .tl{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px}

const METRICS = {
  zhvi:             { label:'Home Value (ZHVI)',     fmt: v => '$'+Math.round(v).toLocaleString(), lo:'Low Value', hi:'High Value' },
  zhvi_yoy:         { label:'Value Change YoY %',   fmt: v => (v>0?'+':'')+v.toFixed(1)+'%', lo:'Falling', hi:'Rising' },
  active_listings:  { label:'Active Listings',       fmt: v => v.toLocaleString(), lo:'Few', hi:'Many' },
  new_listings:     { label:'New Listings',          fmt: v => v.toLocaleString(), lo:'Few', hi:'Many' },
  pending_listings: { label:'Pending Sales',         fmt: v => v.toLocaleString(), lo:'Few', hi:'Many' },
  days_on_market:   { label:'Days on Market',        fmt: v => v+' days', lo:'Fast', hi:'Slow' },
  price_reduced_pct:{ label:'Price Reductions %',   fmt: v => v.toFixed(1)+'%', lo:'Few Cuts', hi:'Many Cuts' },
};

let metric = 'zhvi', selected = null;

// Color interpolators per metric
function getColor(val, min, max, m) {
  const t = max === min ? 0.5 : (val - min) / (max - min);
  if (m === 'zhvi' || m === 'zhvi_yoy') {
    // cyan low → white high
    const r = Math.round(0 + t*255), g = Math.round(180 + t*75), b = Math.round(255 - t*55);
    return `rgb(${r},${g},${b})`;
  }
  if (m === 'days_on_market' || m === 'price_reduced_pct') {
    // green = fast/few (good), red = slow/many (bad)
    const r = Math.round(t * 248), g = Math.round(174 - t * 100), b = Math.round(t < 0.5 ? 80 : 30);
    return `rgb(${r},${g},${b})`;
  }
  // default: dark blue → cyan
  const r = Math.round(6 + t*0), g = Math.round(13 + t*197), b = Math.round(31 + t*224);
  return `rgb(${r},${g},${b})`;
}

function drawLegend(min, max) {
  const canvas = document.getElementById('leg-canvas');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,110,0);
  for (let i=0;i<=10;i++) grad.addColorStop(i/10, getColor(min+(max-min)*(i/10), min, max, metric));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,110,7);
  const m = METRICS[metric];
  document.getElementById('leg-lo').textContent = m.lo;
  document.getElementById('leg-hi').textContent = m.hi;
}

const svg = d3.select('#map-svg');
const mapArea = document.querySelector('.map-area');
let geoData = null;

fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')
  .then(r => r.json())
  .then(us => {
    const all = topojson.feature(us, us.objects.counties);
    all.features = all.features.filter(f => String(f.id).startsWith('39'));
    geoData = all;
    render();
    window.addEventListener('resize', render);
  });

function render() {
  if (!geoData) return;
  const w = mapArea.clientWidth, h = mapArea.clientHeight;
  svg.selectAll('*').remove();

  const proj = d3.geoAlbersUsa().fitSize([w*.95, h*.92], geoData).translate([w*.475, h*.5]);
  const pathGen = d3.geoPath().projection(proj);

  const vals = DATA.map(d => d[metric]).filter(v => v != null);
  const mn = d3.min(vals), mx = d3.max(vals);

  svg.append('g').selectAll('.county-path')
    .data(geoData.features).enter()
    .append('path')
    .attr('class', d => 'county-path' + (FIPS[String(d.id).padStart(5,'0')] === selected ? ' selected' : ''))
    .attr('d', pathGen)
    .attr('fill', d => {
      const name = FIPS[String(d.id).padStart(5,'0')];
      const cd = name && dataMap[name];
      const v = cd && cd[metric];
      return v != null ? getColor(v, mn, mx, metric) : '#111827';
    })
    .on('mousemove', function(event, d) {
      const name = FIPS[String(d.id).padStart(5,'0')];
      const cd = name && dataMap[name];
      if (!name) return;
      const v = cd && cd[metric];
      const tt = document.getElementById('tooltip');
      tt.querySelector('.tc').textContent = name + ' County';
      tt.querySelector('.tv').textContent = v != null ? METRICS[metric].fmt(v) : 'N/A';
      tt.querySelector('.tl').textContent = METRICS[metric].label;
      tt.style.opacity = 1;
      const rect = mapArea.getBoundingClientRect();
      let x = event.clientX - rect.left + 14, y = event.clientY - rect.top - 12;
      if (x + 175 > w) x -= 185;
      tt.style.left = x+'px'; tt.style.top = y+'px';
    })
    .on('mouseleave', () => { document.getElementById('tooltip').style.opacity = 0; })
    .on('click', (event, d) => {
      const name = FIPS[String(d.id).padStart(5,'0')];
      if (!name || !dataMap[name]) return;
      selected = name;
      showPanel(name);
      render();
    });

  drawLegend(mn, mx);
}

function fmt$(v) { return v ? '$'+v.toLocaleString() : '—'; }
function fmtN(v) { return v != null ? v.toLocaleString() : '—'; }

function showPanel(name) {
  const d = dataMap[name];
  document.getElementById('pc-name').textContent = name + ' County';

  document.getElementById('p-zhvi').textContent = fmt$(d.zhvi);
  const yoyEl = document.getElementById('p-yoy');
  yoyEl.textContent = d.zhvi_yoy != null ? (d.zhvi_yoy>0?'+':'')+d.zhvi_yoy+'%' : '—';
  yoyEl.className = 'sv' + (d.zhvi_yoy > 0 ? ' up' : d.zhvi_yoy < 0 ? ' dn' : '');

  document.getElementById('p-list').textContent = fmt$(d.median_list_price);
  document.getElementById('p-dom').textContent = d.days_on_market != null ? d.days_on_market+' days' : '—';
  document.getElementById('p-active').textContent = fmtN(d.active_listings);
  document.getElementById('p-pending').textContent = fmtN(d.pending_listings);

  // Bar chart — all metrics normalized
  const bars = [
    { l:'Active', v: d.active_listings },
    { l:'New', v: d.new_listings },
    { l:'Pending', v: d.pending_listings },
    { l:'DOM', v: d.days_on_market },
    { l:'Price Cut%', v: d.price_reduced_pct },
  ].filter(b => b.v != null);

  const bsvg = d3.select('#bar-chart');
  bsvg.selectAll('*').remove();
  const bw=316, bh=140, m={top:8,right:8,bottom:24,left:36};
  const iw=bw-m.left-m.right, ih=bh-m.top-m.bottom;
  const bg = bsvg.append('g').attr('transform',`translate(${m.left},${m.top})`);
  const x = d3.scaleBand().domain(bars.map(b=>b.l)).range([0,iw]).padding(0.28);
  const y = d3.scaleLinear().domain([0, d3.max(bars,b=>b.v)*1.18]).range([ih,0]);
  const colors = ['#00d4ff','#818cf8','#4ade80','#fb923c','#f472b6'];

  y.ticks(4).forEach(t => bg.append('line').attr('x1',0).attr('x2',iw).attr('y1',y(t)).attr('y2',y(t)).attr('stroke','rgba(0,210,255,0.06)').attr('stroke-width',1));

  bg.selectAll('.bar').data(bars).enter().append('rect')
    .attr('x',b=>x(b.l)).attr('width',x.bandwidth())
    .attr('y',b=>y(b.v)).attr('height',b=>ih-y(b.v))
    .attr('fill',(b,i)=>colors[i]).attr('rx',3).attr('opacity',0.82);

  bg.append('g').attr('transform',`translate(0,${ih})`).call(d3.axisBottom(x).tickSize(0))
    .call(g=>g.select('.domain').remove())
    .selectAll('text').attr('fill','rgba(255,255,255,0.35)').attr('font-size','9px').attr('font-family','Montserrat');

  bg.append('g').call(d3.axisLeft(y).ticks(4).tickSize(0).tickFormat(v=>v>=1000?Math.round(v/1000)+'k':v))
    .call(g=>g.select('.domain').remove())
    .selectAll('text').attr('fill','rgba(255,255,255,0.28)').attr('font-size','9px').attr('font-family','Montserrat');

  // Rank by current metric
  const sorted = [...DATA].filter(c=>c[metric]!=null).sort((a,b)=>b[metric]-a[metric]);
  const rank = sorted.findIndex(c=>c.county===name)+1;
  document.getElementById('rank-note').innerHTML =
    `Ranked <strong>#${rank} of ${sorted.length}</strong> Ohio counties by ${METRICS[metric].label}`;

  document.getElementById('chart-panel').classList.add('visible');
}

document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('chart-panel').classList.remove('visible');
  selected = null; render();
});

document.querySelectorAll('.metric-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.metric-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    metric = btn.dataset.metric;
    if (selected) showPanel(selected);
    render();
  });
});
</script>
</body>
</html>
